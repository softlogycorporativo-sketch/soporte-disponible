<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Panel">
<meta name="theme-color" content="#0f172a">
<title>Panel Soporte</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #0f172a; color: #e2e8f0; min-height: 100vh;
    -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent;
    padding-bottom: env(safe-area-inset-bottom); padding-top: env(safe-area-inset-top);
  }
  .hidden { display: none !important; }

  /* PIN */
  .pin-gate { position:fixed; inset:0; background:#020617; display:flex; align-items:center; justify-content:center; z-index:9999; padding:24px; }
  .pin-box { display:flex; flex-direction:column; align-items:center; gap:20px; max-width:320px; width:100%; }
  .pin-icon { font-size:42px; opacity:0.4; }
  .pin-label { font-size:13px; color:#64748b; text-align:center; }
  .pin-input { font-size:28px; letter-spacing:12px; text-align:center; padding:14px 12px 14px 24px; width:100%; background:#1e293b; border:1px solid #334155; border-radius:12px; color:#f1f5f9; outline:none; font-family:inherit; }
  .pin-input:focus { border-color:#475569; }
  .pin-input.error { border-color:#b91c1c; animation:shake .25s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .pin-error { font-size:12px; color:#ef4444; height:14px; }


  /* APP */
  .app { max-width:640px; margin:0 auto; padding:16px 14px 80px; }

  /* HEADER */
  .app-header { background:linear-gradient(135deg,#1e293b,#0f172a); border:1px solid #1e293b; border-radius:16px; padding:16px; margin-bottom:16px; }
  .date-line { font-size:20px; font-weight:600; color:#f1f5f9; text-transform:capitalize; }
  .week-line { font-size:12px; color:#64748b; margin-top:2px; }
  .refresh-row { margin-top:12px; padding-top:12px; border-top:1px solid #1e293b; display:flex; align-items:center; justify-content:space-between; }
  .refresh-row .src { font-size:11px; color:#64748b; }
  .refresh-row .src b { color:#94a3b8; }
  .btn-refresh { background:#1e293b; border:1px solid #334155; color:#94a3b8; padding:6px 14px; border-radius:999px; font-size:12px; cursor:pointer; font-family:inherit; }
  .spinning { animation:spin 1s linear infinite; display:inline-block; }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* PROGRESS BAR */
  .rev-stats { display:flex; gap:8px; margin-bottom:14px; padding:10px 14px; background:#1e293b; border-radius:12px; align-items:center; }
  .rev-stats .rev-label { font-size:11px; color:#64748b; flex:1; }
  .rev-stats .rev-label b { color:#10b981; font-size:14px; }
  .rev-bar { flex:2; height:6px; background:#334155; border-radius:3px; overflow:hidden; }
  .rev-bar-fill { height:100%; background:#10b981; transition:width .4s; }

  /* STATS */
  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:14px; }
  .stat { background:#1e293b; border-radius:12px; padding:12px 8px; text-align:center; }
  .stat .n { font-size:22px; font-weight:700; line-height:1; }
  .stat .l { font-size:10px; color:#64748b; margin-top:4px; text-transform:uppercase; letter-spacing:.5px; }
  .stat.ok .n { color:#10b981; } .stat.curso .n { color:#f59e0b; }
  .stat.espera .n { color:#a78bfa; } .stat.pend .n { color:#64748b; }

  /* FILTERS */
  .filter-row { display:flex; gap:6px; overflow-x:auto; margin-bottom:10px; padding:2px 0; scrollbar-width:none; }
  .filter-row::-webkit-scrollbar { display:none; }
  .filter-btn { padding:6px 12px; border-radius:999px; background:#1e293b; border:1px solid #334155; color:#94a3b8; font-size:12px; cursor:pointer; white-space:nowrap; font-family:inherit; transition:all .15s; }
  .filter-btn.active { background:#334155; color:#f1f5f9; border-color:#475569; }
  .filter-btn.today { border-color:#3b82f6; }
  .filter-btn.active.today { background:#1e3a5f; border-color:#3b82f6; color:#93c5fd; }
  .day-row { display:flex; gap:4px; margin-bottom:12px; }
  .day-btn { flex:1; padding:8px 2px; border-radius:10px; background:#1e293b; border:1px solid #334155; color:#94a3b8; font-size:12px; cursor:pointer; font-family:inherit; text-align:center; transition:all .15s; }
  .day-btn .day-name { font-weight:600; font-size:11px; text-transform:uppercase; }
  .day-btn .day-num { font-size:16px; font-weight:700; margin-top:2px; }
  .day-btn.active { background:#334155; color:#f1f5f9; border-color:#475569; }
  .day-btn.today { border-color:#3b82f6; }
  .day-btn.active.today { background:#1e3a5f; border-color:#3b82f6; color:#93c5fd; }

  /* SECTION */
  .section-title { font-size:12px; font-weight:600; color:#64748b; text-transform:uppercase; letter-spacing:1px; margin:16px 0 8px 4px; display:flex; align-items:center; gap:8px; }
  .section-title .count { background:#334155; color:#94a3b8; font-size:10px; padding:2px 8px; border-radius:999px; }

  /* TASK */
  .task { display:flex; align-items:flex-start; gap:10px; background:#1e293b; border:1px solid #1e293b; border-radius:10px; padding:10px 12px; margin-bottom:6px; cursor:pointer; transition:background .15s; }
  .task:active { background:#283548; }
  .task-main { flex:1; min-width:0; }
  .task-title { font-size:14px; color:#e2e8f0; line-height:1.3; font-weight:500; word-wrap:break-word; }
  .task-linda { font-size:10px; margin-top:4px; color:#64748b; }

  /* BADGES */
  .badges { display:flex; flex-direction:column; gap:3px; flex-shrink:0; align-items:flex-end; }
  .badge { font-size:9px; font-weight:600; padding:3px 7px; border-radius:999px; text-transform:uppercase; letter-spacing:.3px; white-space:nowrap; }
  .badge-Completado { background:rgba(16,185,129,.15); color:#6ee7b7; }
  .badge-EnCurso { background:rgba(245,158,11,.15); color:#fcd34d; }
  .badge-EnEspera { background:rgba(167,139,250,.18); color:#c4b5fd; }
  .badge-Pendiente { background:rgba(100,116,139,.18); color:#94a3b8; }
  .badge-linda { border:1px solid; font-size:9px; }
  .badge-linda-OK { background:rgba(16,185,129,.2); color:#6ee7b7; border-color:#065f46; }
  .badge-linda-EnCurso { background:rgba(245,158,11,.2); color:#fcd34d; border-color:#78350f; }
  .badge-linda-Pendiente { background:rgba(100,116,139,.2); color:#94a3b8; border-color:#475569; }
  .badge-linda-EnEspera { background:rgba(167,139,250,.2); color:#c4b5fd; border-color:#5b21b6; }
  .badge-linda-none { background:transparent; color:#475569; border-color:#334155; }

  /* DOT */
  .sdot { width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:5px; }
  .sdot-Completado { background:#10b981; } .sdot-EnCurso { background:#f59e0b; }
  .sdot-EnEspera { background:#a78bfa; } .sdot-Pendiente { background:#475569; }

  /* ACTION BAR */
  .action-bar { display:none; position:fixed; bottom:0; left:0; right:0; background:#1e293b; border-top:1px solid #334155; padding:14px 16px calc(14px + env(safe-area-inset-bottom)); z-index:50; }
  .action-bar.show { display:block; }
  .act-header { font-size:13px; color:#94a3b8; margin-bottom:10px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .act-header b { color:#f1f5f9; }
  .act-label { font-size:10px; color:#64748b; text-transform:uppercase; letter-spacing:.8px; margin-bottom:6px; }
  .estado-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:8px; }
  .estado-btn { padding:10px 4px; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; border:1px solid #334155; font-family:inherit; text-align:center; background:#0f172a; color:#94a3b8; transition:all .15s; }
  .estado-btn:active { transform:scale(.96); }
  .estado-btn.sel { border-width:2px; }
  .estado-btn[data-e="OK"] { color:#6ee7b7; } .estado-btn[data-e="OK"].sel { background:#064e3b; border-color:#10b981; }
  .estado-btn[data-e="En Curso"] { color:#fcd34d; } .estado-btn[data-e="En Curso"].sel { background:#422006; border-color:#f59e0b; }
  .estado-btn[data-e="Pendiente"] { color:#94a3b8; } .estado-btn[data-e="Pendiente"].sel { background:#1e293b; border-color:#64748b; }
  .estado-btn[data-e="En Espera"] { color:#c4b5fd; } .estado-btn[data-e="En Espera"].sel { background:#2e1065; border-color:#a78bfa; }
  .act-close { width:100%; padding:10px; border-radius:8px; background:#1e293b; border:1px solid #334155; color:#64748b; font-size:12px; cursor:pointer; font-family:inherit; margin-top:4px; }

  .empty { background:#1e293b; border-radius:12px; padding:28px 16px; text-align:center; color:#64748b; font-size:13px; }
  .sync-badge { position:fixed; bottom:10px; right:10px; background:rgba(15,23,42,.92); backdrop-filter:blur(8px); border:1px solid #1e293b; font-size:10px; color:#64748b; padding:6px 10px; border-radius:999px; z-index:100; }
  .sync-badge.ok { color:#10b981; border-color:#064e3b; }
  .sync-badge.error { color:#ef4444; border-color:#7f1d1d; }
  .sync-badge.saving { color:#f59e0b; border-color:#78350f; }

  /* FAB */
  .fab { position:fixed; bottom:70px; right:16px; width:52px; height:52px; border-radius:50%; background:linear-gradient(135deg,#3b82f6,#2563eb); color:#fff; font-size:28px; line-height:52px; text-align:center; cursor:pointer; box-shadow:0 4px 16px rgba(37,99,235,.4); z-index:40; border:none; font-family:inherit; transition:transform .15s; }
  .fab:active { transform:scale(.9); }

  /* MODAL CREAR TAREA */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(2,6,23,.85); z-index:200; align-items:flex-end; justify-content:center; }
  .modal-overlay.show { display:flex; }
  .modal-box { background:#1e293b; border-radius:16px 16px 0 0; width:100%; max-width:640px; max-height:85vh; overflow-y:auto; padding:20px 16px calc(20px + env(safe-area-inset-bottom)); }
  .modal-title { font-size:16px; font-weight:600; color:#f1f5f9; margin-bottom:16px; display:flex; align-items:center; justify-content:space-between; }
  .modal-close { background:none; border:none; color:#64748b; font-size:22px; cursor:pointer; padding:4px 8px; }
  .form-group { margin-bottom:14px; }
  .form-label { font-size:11px; color:#64748b; text-transform:uppercase; letter-spacing:.8px; margin-bottom:6px; display:block; }
  .form-select, .form-input, .form-textarea { width:100%; background:#0f172a; border:1px solid #334155; border-radius:10px; color:#e2e8f0; font-size:14px; padding:12px; font-family:inherit; outline:none; }
  .form-select:focus, .form-input:focus, .form-textarea:focus { border-color:#3b82f6; }
  .form-textarea { min-height:80px; resize:vertical; }
  .form-submit { width:100%; padding:14px; border-radius:10px; background:#3b82f6; color:#fff; font-size:14px; font-weight:600; border:none; cursor:pointer; font-family:inherit; margin-top:6px; }
  .form-submit:disabled { opacity:.5; cursor:not-allowed; }
  .form-submit:active:not(:disabled) { background:#1d4ed8; }
  .form-msg { font-size:12px; margin-top:8px; text-align:center; min-height:16px; }
  .form-msg.ok { color:#10b981; } .form-msg.err { color:#ef4444; }
</style>
</head>
<body>

<div id="pinGate" class="pin-gate">
  <div class="pin-box">
    <div class="pin-icon">🔒</div>
    <div class="pin-label">Ingrese PIN para continuar</div>
    <input type="password" id="pinInput" class="pin-input" inputmode="numeric" pattern="[0-9]*" maxlength="4" autofocus autocomplete="off">
    <div id="pinError" class="pin-error"></div>
  </div>
</div>


<div id="app" class="app hidden">
  <header class="app-header">
    <div class="date-line" id="todayDate">—</div>
    <div class="week-line" id="weekLine">—</div>
    <div class="refresh-row">
      <div class="src" id="dataSrc">Cargando...</div>
      <div style="display:flex;gap:6px;">
        <button class="btn-refresh" id="btnSync" title="Sincronizar Planner">&#x2B06; Planner</button>
        <button class="btn-refresh" id="btnRefresh">&#x21bb; Actualizar</button>
      </div>
    </div>
  </header>
  <div class="day-row" id="filterDia"></div>
  <div class="rev-stats" id="revStats"></div>
  <div class="stats" id="stats"></div>
  <div class="filter-row" id="filterTecnico"></div>
  <div class="filter-row" id="filterEstado"></div>
  <div class="filter-row" id="filterLinda"></div>
  <main id="taskList"></main>
</div>

<div class="action-bar" id="actionBar">
  <div class="act-header" id="actHeader">—</div>
  <div class="act-label">Tu estado (Linda)</div>
  <div class="estado-grid" id="estadoGrid"></div>
  <button class="act-close" id="actClose">Cerrar</button>
</div>

<button class="fab hidden" id="fabAdd" title="Nueva tarea">+</button>

<div class="modal-overlay" id="modalCrear">
  <div class="modal-box">
    <div class="modal-title">Nueva tarea <button class="modal-close" id="modalClose">&times;</button></div>
    <div class="form-group">
      <label class="form-label">Técnico</label>
      <select class="form-select" id="fTecnico">
        <option value="">Seleccionar...</option>
        <option value="Anyely">Anyely Peñate</option>
        <option value="Samuel">Samuel Carvajal</option>
        <option value="Jose">Jose Ojeda</option>
        <option value="Evelio">Evelio Prado</option>
        <option value="Jackson">Jackson Borja</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Título de la tarea</label>
      <input type="text" class="form-input" id="fTitulo" placeholder="Ej: Revisión errores FE - Cliente X">
    </div>
    <div class="form-group">
      <label class="form-label">Fecha límite</label>
      <input type="date" class="form-input" id="fFecha">
    </div>
    <div class="form-group">
      <label class="form-label">Descripción</label>
      <textarea class="form-textarea" id="fDesc" placeholder="Detalle de la actividad, entregable esperado, etc."></textarea>
    </div>
    <button class="form-submit" id="fSubmit">Crear tarea en Planner</button>
    <div class="form-msg" id="fMsg"></div>
  </div>
</div>

<div id="syncBadge" class="sync-badge">—</div>

<script>
const PIN = "1105";
const ESTADO_URL = "./estado.json";
const REFRESH_MS = 60000;
const TECH_ORDER = ["Anyely","Samuel","Jose","Evelio","Jackson"];
const ESTADO_ORDER = ["En Curso","Pendiente","En Espera","Completado"];
const LINDA_ESTADOS = ["OK","En Curso","Pendiente","En Espera"];
const MESES = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
const REV_KEY = "panel_revisiones";
const GH_TOKEN = "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";
const GH_API = "https://api.github.com/repos/softlogycorporativo-sketch/soporte-disponible/contents/estado.json";

let tareas = [], revisiones = {}, lastUpdate = null;
let currentSha = null;
let filterTec = null, filterEst = null, filterLinda = null, filterDay = null;
let weekDays = []; // [{date:Date, label:"Lun", num:14}, ...] lun-sab
let refreshTimer = null, selectedId = null;

// ── PIN ──
const pinGate=document.getElementById("pinGate");
const appEl=document.getElementById("app");

if(sessionStorage.getItem("panelAuth")==="ok") showApp();
else {
  document.getElementById("pinInput").addEventListener("input", e => {
    document.getElementById("pinError").textContent="";
    e.target.classList.remove("error");
    if(e.target.value.length===4){
      if(e.target.value===PIN){ sessionStorage.setItem("panelAuth","ok"); showApp(); }
      else { document.getElementById("pinError").textContent="PIN incorrecto"; e.target.classList.add("error"); setTimeout(()=>{e.target.value="";e.target.classList.remove("error")},400); }
    }
  });
}
function showApp(){ pinGate.classList.add("hidden"); appEl.classList.remove("hidden"); showFab(); initApp(); }

// ── INIT ──
async function initApp(){
  renderHeader();
  buildWeekDays();
  // Auto-seleccionar hoy si es lun-sáb
  const todayIdx=new Date().getDay(); // 0=dom
  if(todayIdx>=1&&todayIdx<=6) filterDay=dateKey(new Date());
  else filterDay=dateKey(weekDays[0].date); // si es domingo, mostrar lunes
  // Cargar revisiones locales primero como base
  revisiones=loadRevLocal();
  await loadEstados();
  renderAll();
  if(refreshTimer) clearInterval(refreshTimer);
  refreshTimer=setInterval(async()=>{ await loadEstados(); renderAll(); }, REFRESH_MS);
  document.addEventListener("visibilitychange",()=>{ if(!document.hidden){ loadEstados().then(renderAll); }});
}

document.getElementById("btnRefresh").addEventListener("click", async()=>{
  const btn=document.getElementById("btnRefresh");
  btn.innerHTML='<span class="spinning">&#x21bb;</span>';
  await loadEstados();
  renderAll();
  setTimeout(()=>{ btn.innerHTML='&#x21bb; Actualizar'; },600);
});

document.getElementById("btnSync").addEventListener("click", async()=>{
  if(!SYNC_URL){ alert("Configura la URL del flujo de sincronización (SYNC_URL) en el código."); return; }
  const btn=document.getElementById("btnSync");
  const badge=document.getElementById("syncBadge");
  btn.disabled=true; btn.innerHTML='<span class="spinning">&#x2B06;</span> Sync...';
  badge.textContent="Sincronizando Planner..."; badge.className="sync-badge saving";
  try{
    const r=await fetch(SYNC_URL,{method:"POST",mode:"no-cors"});
    // mode:no-cors → status siempre es 0 (opaque), no podemos leerlo
    badge.textContent="Sincronización enviada, esperando..."; badge.className="sync-badge saving";
    setTimeout(async()=>{ await loadEstados(); renderAll(); },8000);
  } catch(e){
    console.error("SYNC ERROR:",e);
    badge.textContent="Error: "+e.message.substring(0,80); badge.className="sync-badge error";
    alert("Error sync: "+e.message);
  }
  btn.disabled=false; btn.innerHTML='&#x2B06; Planner';
});

// ── LOAD ──
async function loadEstados(){
  const badge=document.getElementById("syncBadge");
  try{
    // Intentar via GitHub API (da sha para escritura)
    if(GH_TOKEN){
      const r=await fetch(GH_API,{headers:{"Authorization":"Bearer "+GH_TOKEN,"Accept":"application/vnd.github.v3+json"}});
      if(!r.ok) throw new Error(r.status);
      const meta=await r.json();
      currentSha=meta.sha;
      const d=JSON.parse(decodeURIComponent(escape(atob(meta.content.replace(/\n/g,"")))));
      if(d&&Array.isArray(d.estados)){
        tareas=d.estados.filter(e=>e.id&&e.title&&e.tecnico);
        lastUpdate=d.actualizado||null;
        // Cargar revisiones desde el JSON (fuente principal)
        if(d.revisiones&&typeof d.revisiones==="object"){
          const local=loadRevLocal();
          // Merge: para cada tarea, usar la más reciente entre JSON y localStorage
          const merged={...d.revisiones};
          for(const k in local){
            if(!merged[k]||new Date(local[k].fecha)>new Date(merged[k].fecha||0)) merged[k]=local[k];
          }
          revisiones=merged;
        }
        badge.textContent="En vivo desde Planner"; badge.className="sync-badge ok";
      } else throw new Error("formato");
    } else {
      // Sin token: solo lectura via URL directa
      const r=await fetch(ESTADO_URL+"?t="+Date.now(),{cache:"no-store"});
      if(!r.ok) throw new Error(r.status);
      const d=await r.json();
      if(d&&Array.isArray(d.estados)){
        tareas=d.estados.filter(e=>e.id&&e.title&&e.tecnico);
        lastUpdate=d.actualizado||null;
        if(d.revisiones) revisiones={...revisiones,...d.revisiones};
        badge.textContent="Solo lectura"; badge.className="sync-badge ok";
      } else throw new Error("formato");
    }
  } catch(e){ console.error("LOAD ERROR:",e); badge.textContent="Error: "+e.message.substring(0,60); badge.className="sync-badge error"; }
}

function loadRevLocal(){
  try{ const s=localStorage.getItem(REV_KEY); if(s) return JSON.parse(s); } catch(e){}
  return {};
}

async function saveRevisiones(){
  // Siempre guardar en localStorage como respaldo
  try{ localStorage.setItem(REV_KEY, JSON.stringify(revisiones)); } catch(e){}
  // Si hay token, guardar en estado.json via GitHub API
  if(!GH_TOKEN) return;
  const badge=document.getElementById("syncBadge");
  badge.textContent="Guardando..."; badge.className="sync-badge saving";
  try{
    const r=await fetch(GH_API,{headers:{"Authorization":"Bearer "+GH_TOKEN,"Accept":"application/vnd.github.v3+json"}});
    if(!r.ok) throw new Error("GET "+r.status);
    const meta=await r.json();
    const content=JSON.parse(decodeURIComponent(escape(atob(meta.content.replace(/\n/g,"")))));
    content.revisiones=revisiones;
    const body=JSON.stringify(content,null,2);
    const encoded=btoa(unescape(encodeURIComponent(body)));
    const w=await fetch(GH_API,{
      method:"PUT",
      headers:{"Authorization":"Bearer "+GH_TOKEN,"Content-Type":"application/json"},
      body:JSON.stringify({message:"rev "+new Date().toLocaleTimeString("es-CO"),content:encoded,sha:meta.sha})
    });
    if(!w.ok) throw new Error("PUT "+w.status);
    badge.textContent="Guardado"; badge.className="sync-badge ok";
  } catch(e){ console.error(e); badge.textContent="Error al guardar"; badge.className="sync-badge error"; }
}

// ── RENDER ──
function renderHeader(){
  const now=new Date();
  const dias=["domingo","lunes","martes","mi\u00e9rcoles","jueves","viernes","s\u00e1bado"];
  document.getElementById("todayDate").textContent=dias[now.getDay()]+" "+now.getDate()+" "+MESES[now.getMonth()]+" "+now.getFullYear();
  const mon=mondayOf(now),fri=new Date(mon); fri.setDate(mon.getDate()+4);
  document.getElementById("weekLine").textContent="Semana "+isoWeek(now)+" \u00b7 "+mon.getDate()+" "+MESES[mon.getMonth()]+" \u2013 "+fri.getDate()+" "+MESES[fri.getMonth()];
}

function renderAll(){ renderFilterDia(); renderSrc(); renderRevStats(); renderStats(); renderFilterTec(); renderFilterEst(); renderFilterLinda(); renderTasks(); }

function buildWeekDays(){
  const DIAS_CORTOS=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
  const mon=mondayOf(new Date());
  weekDays=[];
  for(let i=0;i<6;i++){ // lun(0) a sáb(5)
    const d=new Date(mon); d.setDate(mon.getDate()+i);
    weekDays.push({date:d, label:DIAS_CORTOS[d.getDay()], num:d.getDate()});
  }
}

function dateKey(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }

function taskDateKey(t){
  if(!t.fecha) return null;
  try{ const d=new Date(t.fecha); if(isNaN(d)) return null; return dateKey(d); } catch(e){ return null; }
}

function renderFilterDia(){
  const cont=document.getElementById("filterDia");
  const todayK=dateKey(new Date());
  cont.innerHTML='<button class="day-btn'+(filterDay===null?" active":"")+'" data-v="">'+
    '<div class="day-name">Todo</div><div class="day-num">☰</div></button>'+
    weekDays.map(w=>{
      const k=dateKey(w.date);
      const isToday=k===todayK;
      const isActive=filterDay===k;
      return '<button class="day-btn'+(isActive?" active":"")+(isToday?" today":"")+'" data-v="'+k+'">'+
        '<div class="day-name">'+w.label+'</div><div class="day-num">'+w.num+'</div></button>';
    }).join("");
  cont.querySelectorAll(".day-btn").forEach(b=>b.addEventListener("click",()=>{
    filterDay=b.dataset.v||null;
    renderAll();
  }));
}

function renderSrc(){
  const el=document.getElementById("dataSrc");
  if(lastUpdate){
    const d=new Date(lastUpdate);
    el.innerHTML="Planner <b>"+d.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"})+"</b> \u00b7 "+tareas.length+" tareas"+(GH_TOKEN?"":" \u00b7 <span style='color:#f59e0b'>solo lectura</span>");
  } else el.textContent="Sin datos";
}

function renderRevStats(){
  const f=filtered();
  const total=f.length;
  const ok=f.filter(t=>getLinda(t.id)==="OK").length;
  const pct=total?Math.round(ok/total*100):0;
  document.getElementById("revStats").innerHTML=
    '<div class="rev-label">Revisadas por Linda <b>'+ok+'</b> / '+total+'</div>'+
    '<div class="rev-bar"><div class="rev-bar-fill" style="width:'+pct+'%"></div></div>'+
    '<div style="font-size:12px;font-weight:700;color:#10b981;min-width:36px;text-align:right">'+pct+'%</div>';
}

function renderStats(){
  const c={"Completado":0,"En Curso":0,"En Espera":0,"Pendiente":0};
  filtered().forEach(t=>c[t.estado]=(c[t.estado]||0)+1);
  document.getElementById("stats").innerHTML=
    '<div class="stat curso"><div class="n">'+(c["En Curso"]||0)+'</div><div class="l">En curso</div></div>'+
    '<div class="stat pend"><div class="n">'+(c["Pendiente"]||0)+'</div><div class="l">Pendiente</div></div>'+
    '<div class="stat espera"><div class="n">'+(c["En Espera"]||0)+'</div><div class="l">En espera</div></div>'+
    '<div class="stat ok"><div class="n">'+(c["Completado"]||0)+'</div><div class="l">Hechas</div></div>';
}

function renderFilterTec(){
  const cont=document.getElementById("filterTecnico");
  cont.innerHTML=["Todos",...TECH_ORDER].map(t=>'<button class="filter-btn'+(((t==="Todos"&&!filterTec)||(t===filterTec))?" active":"")+'" data-v="'+t+'">'+t+'</button>').join("");
  cont.querySelectorAll(".filter-btn").forEach(b=>b.addEventListener("click",()=>{ filterTec=b.dataset.v==="Todos"?null:b.dataset.v; renderAll(); }));
}
function renderFilterEst(){
  const cont=document.getElementById("filterEstado");
  const opts=["Todos","En Curso","Pendiente","En Espera","Completado"];
  cont.innerHTML=opts.map(e=>'<button class="filter-btn'+(((e==="Todos"&&!filterEst)||(e===filterEst))?" active":"")+'" data-v="'+e+'">'+e+'</button>').join("");
  cont.querySelectorAll(".filter-btn").forEach(b=>b.addEventListener("click",()=>{ filterEst=b.dataset.v==="Todos"?null:b.dataset.v; renderAll(); }));
}
function renderFilterLinda(){
  const cont=document.getElementById("filterLinda");
  const opts=[{k:null,l:"Linda: Todos"},{k:"OK",l:"OK"},{k:"En Curso",l:"En Curso"},{k:"Pendiente",l:"Pendiente"},{k:"En Espera",l:"En Espera"},{k:"sin",l:"Sin estado"}];
  cont.innerHTML=opts.map(o=>'<button class="filter-btn'+((filterLinda===o.k)?" active":"")+'" data-v="'+(o.k||"")+'">'+o.l+'</button>').join("");
  cont.querySelectorAll(".filter-btn").forEach(b=>b.addEventListener("click",()=>{ filterLinda=b.dataset.v||null; renderAll(); }));
}

function renderTasks(){
  const list=document.getElementById("taskList");
  const f=filtered();
  if(!f.length){ list.innerHTML='<div class="empty">Sin tareas</div>'; return; }
  const groups={}; TECH_ORDER.forEach(t=>groups[t]=[]);
  f.forEach(t=>{ if(!groups[t.tecnico]) groups[t.tecnico]=[]; groups[t.tecnico].push(t); });
  let html="";
  for(const tec of TECH_ORDER){
    const tasks=groups[tec]; if(!tasks||!tasks.length) continue;
    tasks.sort((a,b)=>ESTADO_ORDER.indexOf(a.estado)-ESTADO_ORDER.indexOf(b.estado));
    html+='<div class="section-title">'+tec+' <span class="count">'+tasks.length+'</span></div>';
    tasks.forEach(t=>{
      const ec=t.estado.replace(/ /g,"");
      const le=getLinda(t.id);
      const lec=le?le.replace(/ /g,""):"none";
      const titulo=t.title.replace(/^[^-]+ - /,"");
      html+='<div class="task" data-id="'+t.id+'">'+
        '<div class="sdot sdot-'+ec+'"></div>'+
        '<div class="task-main"><div class="task-title">'+esc(titulo)+'</div>'+
        (le?'<div class="task-linda">Linda: '+le+(revisiones[t.id]&&revisiones[t.id].fecha?' \u00b7 '+fmtDate(revisiones[t.id].fecha):'')+'</div>':'')+
        '</div>'+
        '<div class="badges">'+
        '<span class="badge badge-'+ec+'">'+t.estado+'</span>'+
        '<span class="badge badge-linda badge-linda-'+lec+'">'+(le?'L: '+le:'sin rev')+'</span>'+
        '</div></div>';
    });
  }
  list.innerHTML=html;
  list.querySelectorAll(".task").forEach(el=>el.addEventListener("click",()=>openBar(el.dataset.id)));
}

function filtered(){
  let f=tareas;
  // Filtrar solo semana en curso (lun-sáb)
  if(weekDays.length){
    const monK=dateKey(weekDays[0].date);
    const satK=dateKey(weekDays[weekDays.length-1].date);
    f=f.filter(t=>{
      const tk=taskDateKey(t);
      if(!tk) return !filterDay; // tareas sin fecha solo se muestran en "Todo"
      return tk>=monK&&tk<=satK;
    });
  }
  // Filtrar por día específico
  if(filterDay){
    f=f.filter(t=>{
      const tk=taskDateKey(t);
      return tk===filterDay;
    });
  }
  if(filterTec) f=f.filter(t=>t.tecnico===filterTec);
  if(filterEst) f=f.filter(t=>t.estado===filterEst);
  if(filterLinda==="sin") f=f.filter(t=>!getLinda(t.id));
  else if(filterLinda) f=f.filter(t=>getLinda(t.id)===filterLinda);
  return f;
}

function getLinda(id){ return revisiones[id]&&revisiones[id].estado?revisiones[id].estado:null; }

// ── ACTION BAR ──
function openBar(id){
  selectedId=id;
  const t=tareas.find(x=>x.id===id); if(!t) return;
  const titulo=t.title.replace(/^[^-]+ - /,"");
  document.getElementById("actHeader").innerHTML='<b>'+esc(t.tecnico)+'</b> \u2014 '+esc(titulo);
  const cur=getLinda(id);
  const grid=document.getElementById("estadoGrid");
  grid.innerHTML=LINDA_ESTADOS.map(e=>'<button class="estado-btn'+(cur===e?' sel':'')+'" data-e="'+e+'">'+e+'</button>').join("");
  grid.querySelectorAll(".estado-btn").forEach(b=>b.addEventListener("click",async()=>{
    const e=b.dataset.e;
    revisiones[id]={estado:e, fecha:new Date().toISOString()};
    await saveRevisiones();
    closeBar(); renderAll();
  }));
  document.getElementById("actionBar").classList.add("show");
}
document.getElementById("actClose").addEventListener("click",closeBar);
function closeBar(){ document.getElementById("actionBar").classList.remove("show"); selectedId=null; }

document.getElementById("fSubmit").addEventListener("click",async()=>{

  const fecha=document.getElementById("fFecha").value;
  const desc=document.getElementById("fDesc").value.trim();

    const payload={
      tecnico: tec,
      titulo: tec+" - "+titulo,
      fecha: fecha+"T16:00:00Z",
      descripcion: desc||"",
      planId: info.plan,
      bucketId: info.bucket,
      userId: info.user
    };
    const r=await fetch(FLOW_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(payload)

});

// ── HELPERS ──
function fmtDate(iso){ if(!iso) return ""; const d=new Date(iso); return d.getDate()+" "+MESES[d.getMonth()]+" "+d.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"}); }
function esc(s){ return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }
function mondayOf(d){ const r=new Date(d); r.setDate(d.getDate()-((d.getDay()+6)%7)); r.setHours(0,0,0,0); return r; }
function isoWeek(d){ const t=new Date(d.valueOf()); t.setDate(t.getDate()-((d.getDay()+6)%7)+3); const f=t.valueOf(); t.setMonth(0,1); if(t.getDay()!==4) t.setMonth(0,1+((4-t.getDay())+7)%7); return 1+Math.ceil((f-t)/604800000); }
