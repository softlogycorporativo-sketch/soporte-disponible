<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Panel">
<meta name="theme-color" content="#0f172a">
<title>Panel</title>
<style>
  /* ============================================================
     PANEL SEMANAL SOPORTE - Mobile-first PWA
     Ubicacion: soporte-disponible/panel.html
     PIN: editable en la linea 1 del JS
     ============================================================ */

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    padding-bottom: env(safe-area-inset-bottom);
    padding-top: env(safe-area-inset-top);
  }
  .hidden { display: none !important; }

  /* ---------- PIN GATE ---------- */
  .pin-gate {
    position: fixed;
    inset: 0;
    background: #020617;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    padding: 24px;
  }
  .pin-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    max-width: 280px;
    width: 100%;
  }
  .pin-icon {
    font-size: 42px;
    opacity: 0.4;
  }
  .pin-label {
    font-size: 13px;
    color: #64748b;
    text-align: center;
    letter-spacing: 0.5px;
  }
  .pin-input {
    font-size: 28px;
    letter-spacing: 12px;
    text-align: center;
    padding: 14px 12px 14px 24px;
    width: 100%;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    color: #f1f5f9;
    outline: none;
    font-family: inherit;
    transition: border-color 0.15s ease;
  }
  .pin-input:focus {
    border-color: #475569;
  }
  .pin-input.error {
    border-color: #b91c1c;
    animation: shake 0.25s ease;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .pin-error {
    font-size: 12px;
    color: #ef4444;
    height: 14px;
  }

  /* ---------- APP SHELL ---------- */
  .app {
    max-width: 640px;
    margin: 0 auto;
    padding: 16px 14px 80px;
  }

  /* ---------- HEADER ---------- */
  .app-header {
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    border: 1px solid #1e293b;
    border-radius: 16px;
    padding: 16px 16px 14px;
    margin-bottom: 16px;
  }
  .date-line {
    font-size: 20px;
    font-weight: 600;
    color: #f1f5f9;
    text-transform: capitalize;
  }
  .week-line {
    font-size: 12px;
    color: #64748b;
    margin-top: 2px;
  }
  .shift-block {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #1e293b;
  }
  .shift-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: #64748b;
    margin-bottom: 6px;
  }
  .shift-contacts {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .contact-chip {
    background: #1e293b;
    border: 1px solid #334155;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    color: #cbd5e1;
  }
  .contact-chip.soporte2 {
    background: #422006;
    border-color: #92400e;
    color: #fde68a;
  }

  /* ---------- DAY SELECTOR ---------- */
  .day-selector {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 4px 0 8px;
    margin-bottom: 14px;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .day-selector::-webkit-scrollbar { display: none; }
  .day-chip {
    flex: 1;
    min-width: 52px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px 4px 10px;
    border: 1px solid #1e293b;
    background: #1e293b;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s ease;
    color: #94a3b8;
    font-family: inherit;
  }
  .day-chip:active { transform: scale(0.96); }
  .day-chip .day-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .day-chip .day-num {
    font-size: 18px;
    font-weight: 600;
    margin-top: 2px;
    color: #e2e8f0;
  }
  .day-chip.today {
    border-color: #334155;
    background: #0f172a;
  }
  .day-chip.today .day-num { color: #f59e0b; }
  .day-chip.active {
    background: #f59e0b;
    border-color: #f59e0b;
    color: #0f172a;
  }
  .day-chip.active .day-num,
  .day-chip.active .day-label {
    color: #0f172a;
  }

  /* ---------- DAY CONTENT ---------- */
  .day-title {
    font-size: 14px;
    font-weight: 600;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
    padding: 0 4px;
  }
  .empty {
    background: #1e293b;
    border-radius: 12px;
    padding: 28px 16px;
    text-align: center;
    color: #64748b;
    font-size: 13px;
  }

  /* ---------- TIMELINE / ACTIVITY ROWS ---------- */
  .timeline {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .activity {
    display: flex;
    background: #1e293b;
    border: 1px solid #1e293b;
    border-left: 4px solid #475569;
    border-radius: 10px;
    padding: 10px 12px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .activity:active { background: #283548; }
  .activity.done { opacity: 0.55; }
  .activity.done .act-title { text-decoration: line-through; }
  .activity.lunch {
    background: #0f172a;
    border-left-color: #334155;
    border-style: dashed;
    border-top-style: solid;
    border-right-style: solid;
    border-bottom-style: solid;
    opacity: 0.7;
  }
  .act-time {
    min-width: 76px;
    font-size: 11px;
    color: #94a3b8;
    font-variant-numeric: tabular-nums;
    font-weight: 500;
    padding-top: 2px;
  }
  .act-main {
    flex: 1;
    min-width: 0;
  }
  .act-title {
    font-size: 14px;
    color: #e2e8f0;
    line-height: 1.3;
    font-weight: 500;
  }
  .act-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
    flex-wrap: wrap;
  }
  .act-stage {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 600;
  }
  .act-techs {
    font-size: 11px;
    color: #64748b;
  }
  .act-status {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid #475569;
    flex-shrink: 0;
    margin-left: 8px;
    margin-top: 2px;
    position: relative;
  }
  .act-status.done {
    background: #10b981;
    border-color: #10b981;
  }
  .act-status.done::after {
    content: "";
    position: absolute;
    left: 4px;
    top: 1px;
    width: 5px;
    height: 9px;
    border: solid white;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }
  .act-status.in-progress {
    background: #f59e0b;
    border-color: #f59e0b;
  }
  .act-status.in-progress::after {
    content: "";
    position: absolute;
    inset: 3px;
    border-radius: 50%;
    background: white;
    animation: pulse 1.4s infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(0.6); opacity: 0.6; }
    50%      { transform: scale(1);   opacity: 1;   }
  }

  .activity .act-details {
    display: none;
    grid-column: 1 / -1;
    flex-basis: 100%;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed #334155;
    font-size: 12px;
    color: #94a3b8;
    line-height: 1.45;
  }
  .activity.expanded { flex-wrap: wrap; }
  .activity.expanded .act-details { display: block; }
  .act-details .act-description {
    margin-bottom: 6px;
  }
  .act-details .act-notes {
    font-size: 11px;
    color: #64748b;
    font-style: italic;
  }

  /* ---------- STAGE COLORS ---------- */
  .etapa-preventivo  { border-left-color: #166534; }
  .etapa-rutina      { border-left-color: #64748b; }
  .etapa-implementacion { border-left-color: #1e3a8a; }
  .etapa-actualizacion  { border-left-color: #6b21a8; }
  .etapa-despliegue  { border-left-color: #78350f; }
  .etapa-conciliacion{ border-left-color: #1e40af; }
  .etapa-pruebas     { border-left-color: #991b1b; }
  .etapa-reunion     { border-left-color: #1e293b; background: #1a2332; }
  .etapa-documentacion { border-left-color: #581c87; }
  .etapa-seguimiento { border-left-color: #0d9488; }
  .etapa-auditoria   { border-left-color: #57534e; }
  .etapa-coordinacion{ border-left-color: #92400e; }

  .act-stage.stage-rutina       { background: #334155; color: #cbd5e1; }
  .act-stage.stage-implementacion{ background: #1e3a8a; color: #bfdbfe; }
  .act-stage.stage-actualizacion{ background: #581c87; color: #e9d5ff; }
  .act-stage.stage-despliegue   { background: #78350f; color: #fed7aa; }
  .act-stage.stage-conciliacion { background: #1e40af; color: #bfdbfe; }
  .act-stage.stage-pruebas      { background: #991b1b; color: #fecaca; }
  .act-stage.stage-reunion      { background: #1e293b; color: #cbd5e1; }
  .act-stage.stage-documentacion{ background: #581c87; color: #e9d5ff; }
  .act-stage.stage-seguimiento  { background: #0d9488; color: #ccfbf1; }
  .act-stage.stage-auditoria    { background: #57534e; color: #e7e5e4; }
  .act-stage.stage-coordinacion { background: #92400e; color: #fed7aa; }

  /* ---------- TECH FILTER ---------- */
  .filter-row {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    margin-bottom: 12px;
    padding: 2px 0;
    scrollbar-width: none;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .tech-filter {
    padding: 6px 12px;
    border-radius: 999px;
    background: #1e293b;
    border: 1px solid #334155;
    color: #94a3b8;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
    transition: all 0.15s ease;
  }
  .tech-filter.active {
    background: #334155;
    color: #f1f5f9;
    border-color: #475569;
  }

  /* ---------- FOOTER ---------- */
  .sync-badge {
    position: fixed;
    bottom: 10px;
    right: 10px;
    background: rgba(15, 23, 42, 0.92);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid #1e293b;
    font-size: 10px;
    color: #64748b;
    padding: 6px 10px;
    border-radius: 999px;
    z-index: 100;
  }
  .sync-badge.error { color: #ef4444; border-color: #7f1d1d; }

  /* ---------- SUMMARY PILL ---------- */
  .summary-pill {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #1e293b;
    border: 1px solid #334155;
    padding: 10px 14px;
    border-radius: 10px;
    margin-bottom: 12px;
    font-size: 12px;
    color: #cbd5e1;
  }
  .summary-pill .progress {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .progress-bar {
    width: 80px;
    height: 6px;
    background: #334155;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: #10b981;
    transition: width 0.4s ease;
  }
</style>
</head>

const pinGate  = document.getElementById("pinGate");

const pinError = document.getElementById("pinError");
const appEl    = document.getElementById("app");

if (sessionStorage.getItem("panelAuth") === "ok") {
  showApp();
} else {
  pinInput.addEventListener("input", (e) => {
    pinError.textContent = "";
    pinInput.classList.remove("error");
    if (e.target.value.length === 4) {
      if (e.target.value === PIN) {
        sessionStorage.setItem("panelAuth", "ok");
        showApp();
      } else {
        pinError.textContent = "PIN incorrecto";
        pinInput.classList.add("error");
        setTimeout(() => { pinInput.value = ""; pinInput.classList.remove("error"); }, 400);
      }
    }
  });
}

function showApp() {
  pinGate.classList.add("hidden");
  appEl.classList.remove("hidden");
  initApp();
}

// ========================================================================
// APP STATE
// ========================================================================
const TEAM = {};        // tel-normalizado -> nombre
let activeShiftNames = [];
let selectedDay = null;
let selectedTech = null;

// ========================================================================
// INIT
// ========================================================================
async function initApp() {
  renderHeader();
  await loadTurnosYParejas();
  renderActiveShift();
  renderDaySelector();
  renderTechFilters();

  const todayK = todayKey();
  selectedDay = SCHEDULE[todayK] ? todayK : firstWeekdayKey();
  renderDay();
}

// ========================================================================
// HELPERS
// ========================================================================
function normalizeTel(t) { return String(t || "").replace(/\D/g, ""); }

function todayKey() {
  const d = new Date();
  return toISODate(d);
}
function toISODate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}
function firstWeekdayKey() {
  const keys = Object.keys(SCHEDULE).sort();
  return keys[0];
}

function mondayOfWeek(d) {
  const day = d.getDay();
  const monday = new Date(d);
  monday.setDate(d.getDate() - ((day + 6) % 7));
  monday.setHours(0,0,0,0);
  return monday;
}

function getIsoWeek(d) {
  const target = new Date(d.valueOf());
  const dayNr = (d.getDay() + 6) % 7;
  target.setDate(target.getDate() - dayNr + 3);
  const firstThursday = target.valueOf();
  target.setMonth(0, 1);
  if (target.getDay() !== 4) {
    target.setMonth(0, 1 + ((4 - target.getDay()) + 7) % 7);
  }
  return 1 + Math.ceil((firstThursday - target) / 604800000);
}

const MESES = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
const DIAS  = ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];

// ========================================================================
// CARGA DE turnos.json y parejas.json
// ========================================================================
async function loadTurnosYParejas() {
  // parejas.json
  try {
    const r = await fetch("./parejas.json", { cache: "no-store" });
    if (r.ok) {
      const parejas = await r.json();
      if (parejas.equipos) {
        for (const [name, info] of Object.entries(parejas.equipos)) {
          TEAM[normalizeTel(info.tel)] = capitalize(name);
        }
      }
    }
  } catch (e) { /* silencioso, usamos fallback */ }

  // Respaldo si parejas.json no trajo nada
  if (Object.keys(TEAM).length === 0) {
    for (const [tel, name] of Object.entries(TEAM_FALLBACK)) {
      TEAM[tel] = name;
    }
  }

  // turnos.json
  const syncBadge = document.getElementById("syncBadge");
  try {
    const r = await fetch("./turnos.json", { cache: "no-store" });
    if (!r.ok) throw new Error("no turnos");
    const turnos = await r.json();

    activeShiftNames = (turnos.contactos || [])
      .map(c => TEAM[normalizeTel(c.tel)] || c.tel);

    if (turnos.actualizado) {
      const d = new Date(turnos.actualizado);
      const fmt = d.toLocaleString("es-CO", {
        day: "numeric", month: "short",
        hour: "numeric", minute: "2-digit", hour12: true
      });
      syncBadge.textContent = "⚡ Últ. sincronizado: " + fmt;
      syncBadge.classList.remove("error");
    }
  } catch (e) {
    syncBadge.textContent = "⚠ turnos.json no disponible";
    syncBadge.classList.add("error");
    activeShiftNames = [];
  }
}

// ========================================================================
// RENDER
// ========================================================================
function renderHeader() {
  const now = new Date();
  const fecha = `${DIAS[now.getDay()]} ${now.getDate()} ${MESES[now.getMonth()]} ${now.getFullYear()}`;
  document.getElementById("todayDate").textContent = fecha;

  const monday = mondayOfWeek(now);
  const friday = new Date(monday); friday.setDate(monday.getDate() + 4);
  const weekN = getIsoWeek(now);
  document.getElementById("weekLine").textContent =
    `Semana ${weekN} · ${monday.getDate()} ${MESES[monday.getMonth()]} – ${friday.getDate()} ${MESES[friday.getMonth()]}`;

  document.getElementById("weekNotes").textContent = WEEK_NOTES;
}

function renderActiveShift() {
  const cont = document.getElementById("activeShift");
  if (!activeShiftNames || activeShiftNames.length === 0) {
    cont.innerHTML = '<span class="contact-chip">sin datos</span>';
    return;
  }
  cont.innerHTML = activeShiftNames
    .map(n => `<span class="contact-chip">${n}</span>`)
    .join("");
}

function renderDaySelector() {
  const cont = document.getElementById("daySelector");
  cont.innerHTML = "";

  const keys = Object.keys(SCHEDULE).sort();
  const todayK = todayKey();
  const labels = { 1:"Lun", 2:"Mar", 3:"Mié", 4:"Jue", 5:"Vie" };

  keys.forEach(key => {
    const d = new Date(key + "T00:00:00");
    const btn = document.createElement("button");
    btn.className = "day-chip";
    btn.dataset.dayKey = key;
    if (key === todayK) btn.classList.add("today");
    btn.innerHTML = `<span class="day-label">${labels[d.getDay()] || ""}</span><span class="day-num">${d.getDate()}</span>`;
    btn.addEventListener("click", () => {
      selectedDay = key;
      document.querySelectorAll(".day-chip").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      renderDay();
    });
    cont.appendChild(btn);
  });

  // Seleccionar hoy por defecto
  const initial = cont.querySelector(`[data-day-key="${todayK}"]`) || cont.firstElementChild;
  if (initial) initial.classList.add("active");
}

function renderTechFilters() {
  const cont = document.getElementById("techFilters");
  cont.innerHTML = "";

  const techs = ["Todos", ...TECH_ORDER];
  techs.forEach(t => {
    const b = document.createElement("button");
    b.className = "tech-filter";
    if (t === "Todos") b.classList.add("active");
    b.textContent = t;
    b.addEventListener("click", () => {
      selectedTech = (t === "Todos") ? null : t;
      document.querySelectorAll(".tech-filter").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      renderDay();
    });
    cont.appendChild(b);
  });
}

function renderDay() {
  const acts = SCHEDULE[selectedDay] || [];
  const d = new Date(selectedDay + "T00:00:00");
  document.getElementById("dayTitle").textContent =
    `${DIAS[d.getDay()]} ${d.getDate()} de ${MESES[d.getMonth()]}`.toUpperCase();

  // Filtrar por técnico si hay
  let filtered = acts;
  if (selectedTech) {
    filtered = acts.filter(a => (a.tecnicos || []).includes(selectedTech));
  }

  const timeline = document.getElementById("timeline");
  if (filtered.length === 0) {
    timeline.innerHTML = '<div class="empty">Sin actividades para este día</div>';
    updateSummary(0, 0);
    return;
  }

  timeline.innerHTML = "";
  let done = 0;
  let total = 0;

  filtered.forEach((a, idx) => {
    const etapaKey = a.etapa.toLowerCase();
    const isLunch = etapaKey === "lunch";

    if (!isLunch) { total++; if (a.estado === "done") done++; }

    const row = document.createElement("div");
    row.className = `activity etapa-${etapaKey} ${a.estado === "done" ? "done" : ""} ${isLunch ? "lunch" : ""}`;

    const techsDisplay = (a.tecnicos || []).join(" · ");
    const statusClass = a.estado === "done" ? "done" : (a.estado === "in-progress" ? "in-progress" : "");

    row.innerHTML = `
      <div class="act-time">${a.hora}</div>
      <div class="act-main">
        <div class="act-title">${isLunch ? "🍽 " : ""}${a.titulo}</div>
        <div class="act-meta">
          ${!isLunch ? `<span class="act-stage stage-${etapaKey}">${a.etapa}</span>` : ""}
          <span class="act-techs">${techsDisplay}</span>
        </div>
        <div class="act-details">
          ${a.descripcion ? `<div class="act-description">${a.descripcion}</div>` : ""}
          <div class="act-notes">Tap para ver/cerrar · evidencias y notas se jalan de Planner (pendiente)</div>
        </div>
      </div>
      ${!isLunch ? `<div class="act-status ${statusClass}"></div>` : ""}
    `;

    row.addEventListener("click", () => {
      row.classList.toggle("expanded");
    });

    timeline.appendChild(row);
  });

  updateSummary(done, total);
}

function updateSummary(done, total) {
  const pct = total === 0 ? 0 : Math.round((done / total) * 100);
  document.getElementById("summaryText").textContent = `${done} de ${total} completadas`;
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressPct").textContent = pct + "%";
}

function capitalize(s) {
  if (!s) return s;
  return s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
}

// Refrescar turnos.json cada 2 min
setInterval(() => {
  loadTurnosYParejas().then(renderActiveShift);
}, 120000);
