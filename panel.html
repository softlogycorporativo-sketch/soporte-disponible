<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Panel">
<meta name="theme-color" content="#0f172a">
<title>Panel Soporte</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #0f172a; color: #e2e8f0; min-height: 100vh;
    -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent;
    padding-bottom: env(safe-area-inset-bottom); padding-top: env(safe-area-inset-top);
  }
  .hidden { display: none !important; }

  /* PIN GATE */
  .pin-gate { position:fixed; inset:0; background:#020617; display:flex; align-items:center; justify-content:center; z-index:9999; padding:24px; }
  .pin-box { display:flex; flex-direction:column; align-items:center; gap:20px; max-width:280px; width:100%; }
  .pin-icon { font-size:42px; opacity:0.4; }
  .pin-label { font-size:13px; color:#64748b; text-align:center; letter-spacing:0.5px; }
  .pin-input { font-size:28px; letter-spacing:12px; text-align:center; padding:14px 12px 14px 24px; width:100%; background:#1e293b; border:1px solid #334155; border-radius:12px; color:#f1f5f9; outline:none; font-family:inherit; transition:border-color .15s; }
  .pin-input:focus { border-color:#475569; }
  .pin-input.error { border-color:#b91c1c; animation:shake .25s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .pin-error { font-size:12px; color:#ef4444; height:14px; }

  /* APP */
  .app { max-width:640px; margin:0 auto; padding:16px 14px 80px; }

  /* HEADER */
  .app-header { background:linear-gradient(135deg,#1e293b,#0f172a); border:1px solid #1e293b; border-radius:16px; padding:16px; margin-bottom:16px; }
  .date-line { font-size:20px; font-weight:600; color:#f1f5f9; text-transform:capitalize; }
  .week-line { font-size:12px; color:#64748b; margin-top:2px; }
  .refresh-row { margin-top:12px; padding-top:12px; border-top:1px solid #1e293b; display:flex; align-items:center; justify-content:space-between; }
  .refresh-row .src { font-size:11px; color:#64748b; }
  .refresh-row .src b { color:#94a3b8; }
  .btn-refresh { background:#1e293b; border:1px solid #334155; color:#94a3b8; padding:6px 14px; border-radius:999px; font-size:12px; cursor:pointer; font-family:inherit; }
  .btn-refresh:active { background:#334155; }
  .spinning { animation:spin 1s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* STATS */
  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:14px; }
  .stat { background:#1e293b; border:1px solid #1e293b; border-radius:12px; padding:12px 8px; text-align:center; }
  .stat .n { font-size:22px; font-weight:700; line-height:1; }
  .stat .l { font-size:10px; color:#64748b; margin-top:4px; text-transform:uppercase; letter-spacing:.5px; }
  .stat.ok .n { color:#10b981; }
  .stat.curso .n { color:#f59e0b; }
  .stat.espera .n { color:#a78bfa; }
  .stat.pend .n { color:#64748b; }

  /* FILTERS */
  .filter-row { display:flex; gap:6px; overflow-x:auto; margin-bottom:10px; padding:2px 0; scrollbar-width:none; }
  .filter-row::-webkit-scrollbar { display:none; }
  .filter-btn { padding:6px 12px; border-radius:999px; background:#1e293b; border:1px solid #334155; color:#94a3b8; font-size:12px; cursor:pointer; white-space:nowrap; font-family:inherit; transition:all .15s; }
  .filter-btn.active { background:#334155; color:#f1f5f9; border-color:#475569; }

  /* SECTION */
  .section-title { font-size:12px; font-weight:600; color:#64748b; text-transform:uppercase; letter-spacing:1px; margin:16px 0 8px 4px; display:flex; align-items:center; gap:8px; }
  .section-title .count { background:#334155; color:#94a3b8; font-size:10px; padding:2px 8px; border-radius:999px; }

  /* TASK */
  .task { display:flex; align-items:flex-start; gap:10px; background:#1e293b; border:1px solid #1e293b; border-radius:10px; padding:10px 12px; margin-bottom:6px; }
  .task.done { opacity:.5; }
  .task.done .task-title { text-decoration:line-through; }
  .task-main { flex:1; min-width:0; }
  .task-title { font-size:14px; color:#e2e8f0; line-height:1.3; font-weight:500; word-wrap:break-word; }
  .task-sub { font-size:11px; color:#64748b; margin-top:3px; }
  .badge { flex-shrink:0; font-size:10px; font-weight:600; padding:4px 8px; border-radius:999px; text-transform:uppercase; letter-spacing:.3px; }
  .badge-Completado { background:rgba(16,185,129,.15); color:#6ee7b7; }
  .badge-EnCurso { background:rgba(245,158,11,.15); color:#fcd34d; }
  .badge-EnEspera { background:rgba(167,139,250,.18); color:#c4b5fd; }
  .badge-Pendiente { background:rgba(100,116,139,.18); color:#94a3b8; }

  /* STATUS DOT */
  .sdot { width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:5px; }
  .sdot-Completado { background:#10b981; }
  .sdot-EnCurso { background:#f59e0b; box-shadow:0 0 0 3px rgba(245,158,11,.2); }
  .sdot-EnEspera { background:#a78bfa; }
  .sdot-Pendiente { background:#475569; }

  /* EMPTY */
  .empty { background:#1e293b; border-radius:12px; padding:28px 16px; text-align:center; color:#64748b; font-size:13px; }

  /* SYNC BADGE */
  .sync-badge { position:fixed; bottom:10px; right:10px; background:rgba(15,23,42,.92); backdrop-filter:blur(8px); border:1px solid #1e293b; font-size:10px; color:#64748b; padding:6px 10px; border-radius:999px; z-index:100; }
  .sync-badge.ok { color:#10b981; border-color:#064e3b; }
  .sync-badge.error { color:#ef4444; border-color:#7f1d1d; }
</style>
</head>
<body>

<div id="pinGate" class="pin-gate">
  <div class="pin-box">
    <div class="pin-icon">🔒</div>
    <div class="pin-label">Ingrese PIN para continuar</div>
    <input type="password" id="pinInput" class="pin-input" inputmode="numeric" pattern="[0-9]*" maxlength="4" autofocus autocomplete="off">
    <div id="pinError" class="pin-error"></div>
  </div>
</div>

<div id="app" class="app hidden">
  <header class="app-header">
    <div class="date-line" id="todayDate">—</div>
    <div class="week-line" id="weekLine">—</div>
    <div class="refresh-row">
      <div class="src" id="dataSrc">Cargando...</div>
      <button class="btn-refresh" id="btnRefresh">&#x21bb; Actualizar</button>
    </div>
  </header>

  <div class="stats" id="stats"></div>

  <div class="filter-row" id="filterTecnico"></div>
  <div class="filter-row" id="filterEstado"></div>

  <main id="taskList"></main>
</div>

<div id="syncBadge" class="sync-badge">—</div>

<script>
const PIN = "1105";
const ESTADO_URL = "./estado.json";
const REFRESH_MS = 60 * 1000;
const TECH_ORDER = ["Anyely","Samuel","Jose","Evelio","Jackson"];
const ESTADO_ORDER = ["En Curso","Pendiente","En Espera","Completado"];
const MESES = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
const DIAS = ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];

let tareas = [];
let lastUpdate = null;
let filterTec = null;
let filterEst = null;
let refreshTimer = null;

// === PIN ===
const pinGate = document.getElementById("pinGate");
const pinInput = document.getElementById("pinInput");
const pinError = document.getElementById("pinError");
const appEl = document.getElementById("app");

if (sessionStorage.getItem("panelAuth") === "ok") { showApp(); }
else {
  pinInput.addEventListener("input", e => {
    pinError.textContent = "";
    pinInput.classList.remove("error");
    if (e.target.value.length === 4) {
      if (e.target.value === PIN) { sessionStorage.setItem("panelAuth","ok"); showApp(); }
      else { pinError.textContent = "PIN incorrecto"; pinInput.classList.add("error"); setTimeout(()=>{pinInput.value="";pinInput.classList.remove("error")},400); }
    }
  });
}

function showApp() { pinGate.classList.add("hidden"); appEl.classList.remove("hidden"); initApp(); }

// === INIT ===
async function initApp() {
  renderHeader();
  await loadEstados();
  renderAll();
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(async () => { await loadEstados(); renderAll(); }, REFRESH_MS);
  document.addEventListener("visibilitychange", () => { if (!document.hidden) { loadEstados().then(renderAll); } });
}

document.getElementById("btnRefresh").addEventListener("click", async () => {
  const btn = document.getElementById("btnRefresh");
  btn.innerHTML = '<span class="spinning" style="display:inline-block">&#x21bb;</span>';
  await loadEstados();
  renderAll();
  setTimeout(() => { btn.innerHTML = '&#x21bb; Actualizar'; }, 600);
});

// === LOAD ===
async function loadEstados() {
  const badge = document.getElementById("syncBadge");
  try {
    const r = await fetch(ESTADO_URL + "?t=" + Date.now(), { cache: "no-store" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const d = await r.json();
    if (d && Array.isArray(d.estados)) {
      tareas = d.estados.filter(e => e.id && e.title && e.tecnico);
      lastUpdate = d.actualizado || null;
      badge.textContent = "En vivo desde Planner";
      badge.className = "sync-badge ok";
    } else {
      throw new Error("formato");
    }
  } catch (e) {
    badge.textContent = "Sin conexion a estado.json";
    badge.className = "sync-badge error";
  }
}

// === RENDER ===
function renderHeader() {
  const now = new Date();
  document.getElementById("todayDate").textContent =
    DIAS[now.getDay()] + " " + now.getDate() + " " + MESES[now.getMonth()] + " " + now.getFullYear();
  const mon = mondayOf(now), fri = new Date(mon); fri.setDate(mon.getDate()+4);
  document.getElementById("weekLine").textContent =
    "Semana " + isoWeek(now) + " \u00b7 " + mon.getDate() + " " + MESES[mon.getMonth()] + " \u2013 " + fri.getDate() + " " + MESES[fri.getMonth()];
}

function renderAll() {
  renderSrc();
  renderStats();
  renderFilterTec();
  renderFilterEst();
  renderTasks();
}

function renderSrc() {
  const el = document.getElementById("dataSrc");
  if (lastUpdate) {
    const d = new Date(lastUpdate);
    el.innerHTML = "Planner <b>" + d.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"}) + "</b> \u00b7 " + tareas.length + " tareas";
  } else {
    el.textContent = "Sin datos";
  }
}

function renderStats() {
  const c = { "Completado":0, "En Curso":0, "En Espera":0, "Pendiente":0 };
  filtered().forEach(t => c[t.estado] = (c[t.estado]||0) + 1);
  document.getElementById("stats").innerHTML =
    '<div class="stat curso"><div class="n">' + (c["En Curso"]||0) + '</div><div class="l">En curso</div></div>' +
    '<div class="stat pend"><div class="n">' + (c["Pendiente"]||0) + '</div><div class="l">Pendiente</div></div>' +
    '<div class="stat espera"><div class="n">' + (c["En Espera"]||0) + '</div><div class="l">En espera</div></div>' +
    '<div class="stat ok"><div class="n">' + (c["Completado"]||0) + '</div><div class="l">Hechas</div></div>';
}

function renderFilterTec() {
  const cont = document.getElementById("filterTecnico");
  const techs = ["Todos", ...TECH_ORDER];
  cont.innerHTML = techs.map(t => {
    const active = (t === "Todos" && !filterTec) || (t === filterTec);
    return '<button class="filter-btn' + (active?" active":"") + '" data-tec="' + t + '">' + t + '</button>';
  }).join("");
  cont.querySelectorAll(".filter-btn").forEach(b => b.addEventListener("click", () => {
    filterTec = b.dataset.tec === "Todos" ? null : b.dataset.tec;
    renderAll();
  }));
}

function renderFilterEst() {
  const cont = document.getElementById("filterEstado");
  const estados = ["Todos","En Curso","Pendiente","En Espera","Completado"];
  cont.innerHTML = estados.map(e => {
    const active = (e === "Todos" && !filterEst) || (e === filterEst);
    return '<button class="filter-btn' + (active?" active":"") + '" data-est="' + e + '">' + e + '</button>';
  }).join("");
  cont.querySelectorAll(".filter-btn").forEach(b => b.addEventListener("click", () => {
    filterEst = b.dataset.est === "Todos" ? null : b.dataset.est;
    renderAll();
  }));
}

function renderTasks() {
  const list = document.getElementById("taskList");
  const f = filtered();
  if (f.length === 0) { list.innerHTML = '<div class="empty">Sin tareas</div>'; return; }

  // Agrupar por tecnico
  const groups = {};
  TECH_ORDER.forEach(t => groups[t] = []);
  f.forEach(t => {
    if (!groups[t.tecnico]) groups[t.tecnico] = [];
    groups[t.tecnico].push(t);
  });

  let html = "";
  for (const tec of TECH_ORDER) {
    const tasks = groups[tec];
    if (!tasks || tasks.length === 0) continue;
    // Ordenar: En Curso primero, luego Pendiente, En Espera, Completado
    tasks.sort((a,b) => ESTADO_ORDER.indexOf(a.estado) - ESTADO_ORDER.indexOf(b.estado));
    html += '<div class="section-title">' + tec + ' <span class="count">' + tasks.length + '</span></div>';
    tasks.forEach(t => {
      const ec = t.estado.replace(/ /g, "");
      const done = t.estado === "Completado";
      const titulo = t.title.replace(/^[^-]+ - /, "");
      html += '<div class="task' + (done?" done":"") + '">' +
        '<div class="sdot sdot-' + ec + '"></div>' +
        '<div class="task-main"><div class="task-title">' + esc(titulo) + '</div></div>' +
        '<span class="badge badge-' + ec + '">' + t.estado + '</span></div>';
    });
  }
  list.innerHTML = html;
}

function filtered() {
  let f = tareas;
  if (filterTec) f = f.filter(t => t.tecnico === filterTec);
  if (filterEst) f = f.filter(t => t.estado === filterEst);
  return f;
}

function esc(s) { return String(s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }
function mondayOf(d) { const r=new Date(d); r.setDate(d.getDate()-((d.getDay()+6)%7)); r.setHours(0,0,0,0); return r; }
function isoWeek(d) { const t=new Date(d.valueOf()); t.setDate(t.getDate()-((d.getDay()+6)%7)+3); const f=t.valueOf(); t.setMonth(0,1); if(t.getDay()!==4) t.setMonth(0,1+((4-t.getDay())+7)%7); return 1+Math.ceil((f-t)/604800000); }
</script>
</body>
</html>
